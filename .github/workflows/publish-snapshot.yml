name: Publish SNAPSHOT

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-snapshot
  cancel-in-progress: true

env:
  SNAPSHOT_VERSION: "2.0.1-SNAPSHOT"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Plugin JAR
        run: |
          bash ./gradlew :paper:shadowJar -Pversion=${{ env.SNAPSHOT_VERSION }} --no-daemon

      - name: Upload Downloadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnlimitedNametags-SNAPSHOT
          path: target/UnlimitedNametags.jar

      - name: Publish SNAPSHOT artifacts
        if: ${{ env.MAVEN_CENTRAL_USERNAME != '' && env.ORG_GRADLE_PROJECT_signingKey != '' }}
        run: >
          bash ./gradlew :common:publish :api:publish :api-paper:publish
          -Pversion=${{ env.SNAPSHOT_VERSION }}
          --no-daemon
