name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.0.1)"
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            gradle_ver=$(grep "^version" gradle.properties | cut -d'=' -d' ' -f2)
            echo "VERSION=${gradle_ver}" >> "$GITHUB_ENV"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Plugin JAR
        run: |
          bash ./gradlew :paper:shadowJar -Pversion=$VERSION --no-daemon

      - name: Upload Downloadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnlimitedNametags-Release
          path: target/UnlimitedNametags.jar

      - name: Publish release artifacts
        if: ${{ secrets.MAVEN_CENTRAL_USERNAME != '' && secrets.GPG_PRIVATE_KEY != '' }}
        run: >
          bash ./gradlew :common:publish :api:publish :api-paper:publish
          -Pversion=$VERSION
          --no-daemon
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Release reminder
        if: ${{ secrets.MAVEN_CENTRAL_USERNAME != '' && secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          echo "Release artifacts uploaded to the Maven Central staging repository."
          echo "Open https://central.sonatype.com/ → Deployments → Refresh → Publish for version $VERSION."
